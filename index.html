<!DOCTYPE html>
<html>
<head>
    <title>Global Sufi Shrine Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        .custom-popup { font-family: 'Arial'; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, 0], 2); // Center of the world

        // Use a "dark" or "watercolor" style to match AnimalWorldMap's aesthetic
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Load your Dargah data
        fetch('data.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(`<h3>${feature.properties.name}</h3><p>${feature.properties.description}</p>`);
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
